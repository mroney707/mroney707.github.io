<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to the home page...</p>

  <script>
    // Get the current path
    const path = window.location.pathname;

    // Check if the path starts with '/invite/' and has something after it
    if (path.startsWith('/invite/')) {
      // Redirect to the root of the site
      window.location.href = '/';
    } else {
      // If it's not an invite link, show a custom 404 message
      document.body.innerHTML = `<h1>404 - Page Not Found</h1><p>The page you're looking for does not exist.</p>`;
    }
  </script>
</body>
</html>
